name: CI (Build and Validate)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  frontend-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: xplaincv-mvp/frontend/package-lock.json

      - name: Install dependencies
        working-directory: xplaincv-mvp/frontend
        run: npm ci

      - name: Build frontend
        working-directory: xplaincv-mvp/frontend
        run: npm run build

  backend-check:
    name: Backend Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: xplaincv-mvp/backend/requirements.txt

      - name: Install dependencies
        working-directory: xplaincv-mvp/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8 (Syntax check)
        working-directory: xplaincv-mvp/backend
        run: |
          # Cài đặt flake8 để kiểm tra lỗi cú pháp nhanh
          python -m pip install flake8
          # Chỉ quét các lỗi cú pháp nghiêm trọng (syntax errors, undefined names, etc.)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
