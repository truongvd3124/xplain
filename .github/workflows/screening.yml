name: Screening CI & Docker Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  packages: write  # Quyền push Docker image lên GitHub Packages (GHCR)

jobs:
  frontend-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: xplaincv-screening/frontend/package-lock.json

      - name: Install dependencies
        working-directory: xplaincv-screening/frontend
        run: npm ci

      - name: Build frontend
        working-directory: xplaincv-screening/frontend
        run: npm run build

  backend-check:
    name: Backend Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: xplaincv-screening/backend/requirements.txt

      - name: Install dependencies
        working-directory: xplaincv-screening/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint check
        working-directory: xplaincv-screening/backend
        run: |
          python -m pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [frontend-check, backend-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      # Đăng nhập vào GitHub Container Registry (GHCR) bằng token tự động của workflow
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: actions/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Chuyển đổi tên repo thành dạng chữ thường (lowercase) để hợp lệ với Docker tag
      - name: Lowercase repository name
        id: repo-name
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      # Build & Push API Image
      - name: Build and push API Docker image
        uses: docker/build-push-action@v5
        with:
          context: xplaincv-screening/backend
          file: xplaincv-screening/backend/Dockerfile.api
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ steps.repo-name.outputs.repo }}/screening-api:latest
            ghcr.io/${{ steps.repo-name.outputs.repo }}/screening-api:${{ github.sha }}

      # Build & Push Worker Image
      - name: Build and push Worker Docker image
        uses: docker/build-push-action@v5
        with:
          context: xplaincv-screening/backend
          file: xplaincv-screening/backend/Dockerfile.worker
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ steps.repo-name.outputs.repo }}/screening-worker:latest
            ghcr.io/${{ steps.repo-name.outputs.repo }}/screening-worker:${{ github.sha }}
