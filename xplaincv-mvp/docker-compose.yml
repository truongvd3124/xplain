version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "1000:1000"
    ports:
      - "8001:8000"
    volumes:
      - ./backend/data:/srv/data
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
